<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            gap: 5px;
            flex-direction: column;
        }
        .component-display {

        }
    </style>
</head>
<body>
    <div class="component-display">
        buttons
        <button style="max-width: min-content;" class="btn">Button</button>
        <button style="max-width: min-content;" class="btn btn-green">Button</button>
    </div>
    <div class="component-display">
        <div class="topbar">
            <div class="logo">Kaartspel</div>
        </div>
    </div>
    <div class="component-display">
        <div class="frame">
            <div class="home-hero">
                <div class="suit-row">♠ ♥ ♦ ♣</div>
                <h2>Speel mee.<br>Geen account.</h2>
                <p>2 – 6 spelers &nbsp;·&nbsp; gratis &nbsp;·&nbsp; direct</p>
            </div>
            <button class="btn btn-ink" style="margin-bottom:10px;">
                ＋ &nbsp;Nieuwe lobby maken
            </button>
            <button class="btn btn-ghost" style="margin-bottom:10px;">
                → &nbsp;Lobby joinen met code
            </button>
            <div class="divider-or"><span>of</span></div>
            <button class="btn btn-random" onclick="startRandom()">
                <div class="random-btn-inner">
                    <div class="rbi-top">
                        <span class="dice">🎲</span>
                        RANDOM LOBBY JOINEN
                    </div>
                    <div class="rbi-sub">Word meteen gekoppeld aan een open lobby</div>
                </div>
            </button>
            <div class="no-account">
                <strong>Geen account nodig.</strong><br>
                Je naam kies je per spel.
            </div>
        </div>
    </div>
    <div class="component-display">
        <div class="frame">
            <div class="back-link">← Terug</div>
            <div class="modal-title">Lobby aanmaken</div>
            <div class="modal-sub">Kies een naam en stel de regels in.</div>
            <div class="field-group">
                <label class="field-label">Jouw naam in dit spel</label>
                <input class="field-input" id="input-name" placeholder="bijv. Sander" />
                <div class="field-hint">Zo zien andere spelers jou in de lobby.</div>
            </div>
            <div class="field-group">
                <label class="field-label">Max. aantal spelers</label>
                <select class="field-input" id="input-max">
                    <option>2 spelers</option>
                    <option>3 spelers</option>
                    <option selected>4 spelers</option>
                    <option>5 spelers</option>
                    <option>6 spelers</option>
                </select>
            </div>
            <div class="section-divider"><span>Kaartregels</span></div>
            <button class="accordion-trigger" id="acc-trigger" onclick="toggleAcc()">
                <div class="trigger-left">
                    <div class="trigger-icon">🃏</div>
                    <div class="trigger-text">
                    <div class="trigger-title">Regels per kaart instellen</div>
                    <div class="trigger-summary" id="acc-summary">Optioneel — standaard geen effecten</div>
                    </div>
                </div>
                <div class="chevron" id="acc-chevron">▼</div>
            </button>

            <div class="accordion-panel" id="acc-panel">
                <div class="panel-header">
                    <div>Kaart</div><div>Effect</div><div></div>
                </div>

                <!-- rows generated by JS -->
                <div id="rule-rows"></div>

                <div class="preset-bar">
                    <span class="preset-label">Preset:</span>
                    <button class="preset-btn" onclick="applyPreset('standaard')">Standaard</button>
                    <button class="preset-btn" onclick="applyPreset('pesten')">Pesten</button>
                    <button class="preset-btn" onclick="applyPreset('chaos')">Chaos</button>
                    <button class="preset-btn" onclick="applyPreset('reset')">Wissen</button>
                </div>
            </div>
            <!-- NO code here — only the submit button -->
            <button style="margin-top: 18px;" class="btn btn-green" id="btn-create" onclick="createLobby()">
                Lobby aanmaken →
            </button>
        </div>
    </div>
    <div class="component-display">
        <div class="frame">

        </div>
    </div>
    <script>
        /* ── card definitions ── */
        const CARDS = [
            { id:'A',     label:'A',   suit:'♠', color:'black' },
            { id:'2',     label:'2',   suit:'♥', color:'red'   },
            { id:'3',     label:'3',   suit:'♠', color:'black' },
            { id:'4',     label:'4',   suit:'♦', color:'red'   },
            { id:'5',     label:'5',   suit:'♠', color:'black' },
            { id:'6',     label:'6',   suit:'♥', color:'red'   },
            { id:'7',     label:'7',   suit:'♣', color:'black' },
            { id:'8',     label:'8',   suit:'♦', color:'red'   },
            { id:'9',     label:'9',   suit:'♠', color:'black' },
            { id:'10',    label:'10',  suit:'♥', color:'red'   },
            { id:'J',     label:'J',   suit:'♣', color:'black' },
            { id:'Q',     label:'Q',   suit:'♦', color:'red'   },
            { id:'K',     label:'K',   suit:'♠', color:'black' },
            { id:'Joker', label:'Jo',  suit:'★', color:'gold'  },
        ];

        const EFFECTS = [
            { value:'',       label:'— Geen effect —' },
            { value:'skip',   label:'⏭ Beurt overslaan' },
            { value:'reverse',label:'🔄 Richting omdraaien' },
            { value:'draw1',  label:'+1 Kaart pakken' },
            { value:'draw2',  label:'+2 Kaarten pakken' },
            { value:'draw4',  label:'+4 Kaarten pakken' },
            { value:'extra',  label:'🎯 Nog een beurt' },
            { value:'wild',   label:'🌈 Kleur kiezen' },
            { value:'swap',   label:'↔ Hand wisselen' },
            { value:'peek',   label:'👁 Kaart inkijken' },
        ];

        const EFFECT_EMOJI = {
            skip:'⏭', reverse:'🔄', draw1:'📥', draw2:'📥',
            draw4:'📥', extra:'🎯', wild:'🌈', swap:'↔', peek:'👁'
        };

        const EFFECT_SHORT = {
            skip:'overslaan', reverse:'omdraaien', draw1:'+1 kaart',
            draw2:'+2 kaarten', draw4:'+4 kaarten', extra:'nog een beurt',
            wild:'kleur kiezen', swap:'hand wisselen', peek:'inkijken'
        };

        const PRESETS = {
            standaard: { '2':'draw2', '8':'skip', 'K':'extra' },
            pesten:    { '2':'draw2', '7':'extra', '8':'skip', 'Q':'reverse', 'K':'extra', 'Joker':'draw4' },
            chaos:     { 'A':'wild','2':'draw2','4':'reverse','7':'swap','8':'skip','J':'peek','Q':'reverse','K':'extra','Joker':'draw4' },
            reset:     {},
        };

        let currentRules = {};

        /* ── build rule rows ── */
        function buildRows() {
            const container = document.getElementById('rule-rows');
            container.innerHTML = '';
            CARDS.forEach(card => {
            const row = document.createElement('div');
            row.className = 'rule-row';
            row.id = 'row-' + card.id;

            const cardStyle = card.color === 'gold'
                ? `style="background:linear-gradient(135deg,#f5e4a0,#e8c060);border-color:#c8a040;"`
                : '';
            const valColor = card.color === 'gold' ? 'style="color:#7a5010;font-size:10px;"' : '';
            const suitColor = card.color === 'gold' ? 'style="color:#7a5010;"' : '';

            const options = EFFECTS.map(e =>
                `<option value="${e.value}">${e.label}</option>`
            ).join('');

            row.innerHTML = `
                <div>
                <div class="card-mini ${card.color}" ${cardStyle}>
                    <div class="cv" ${valColor}>${card.label}</div>
                    <div class="cs" ${suitColor}>${card.suit}</div>
                </div>
                </div>
                <select class="effect-select" onchange="setRule('${card.id}', this)">${options}</select>
                <div class="effect-badge none" id="badge-${card.id}">—</div>
            `;
            container.appendChild(row);
            });
            updateSummary();
        }

        function toggleAcc() {
            const panel   = document.getElementById('acc-panel');
            const trigger = document.getElementById('acc-trigger');
            const chevron = document.getElementById('acc-chevron');
            const open = panel.classList.contains('open');
            panel.classList.toggle('open', !open);
            trigger.classList.toggle('open', !open);
            chevron.classList.toggle('open', !open);
        }
        
        buildRows()
    </script>
</body>
</html>
